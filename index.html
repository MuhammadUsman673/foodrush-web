<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodRush - Reset Password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F0F1A;
      color: #fff;
      font-family: -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1E1E2E;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .emoji { font-size: 48px; text-align: center; display: block; margin-bottom: 16px; }
    h1 { text-align: center; font-size: 24px; margin-bottom: 8px; }
    p { text-align: center; color: #888; margin-bottom: 32px; font-size: 15px; }
    label { display: block; color: #aaa; margin-bottom: 8px; font-size: 14px; font-weight: 600; }
    input {
      width: 100%;
      background: #0F0F1A;
      border: 1px solid #2E2E3E;
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff;
      font-size: 16px;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #6C63FF; }
    button {
      width: 100%;
      background: #6C63FF;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #5a52e0; }
    .error {
      background: #FF658420;
      border: 1px solid #FF6584;
      border-radius: 10px;
      padding: 12px;
      color: #FF6584;
      margin-bottom: 16px;
      display: none;
    }
    .success {
      text-align: center;
      display: none;
    }
    .success .big-emoji { font-size: 64px; margin-bottom: 16px; }
    .success h2 { margin-bottom: 8px; }
    .success p { margin-bottom: 24px; }
    .open-app {
      background: #6C63FF;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="form-section">
      <span class="emoji">🔐</span>
      <h1>Reset Password</h1>
      <p>Enter your new password below</p>
      <div class="error" id="error"></div>
      <label>New Password</label>
      <input type="password" id="password" placeholder="Enter new password" />
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Confirm new password" />
      <button onclick="resetPassword()">Reset Password 🔐</button>
    </div>
    <div class="success" id="success-section">
      <div class="big-emoji">✅</div>
      <h2>Password Updated!</h2>
      <p>Your password has been reset successfully. Open the app to login.</p>
      <a href="appproject://" class="open-app">Open FoodRush App 🍕</a>
    </div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      'https://kzodtavvdnzxplprzusl.supabase.co',
      'sb_publishable_DXKTC0Wz-X_RroOeN-1z1Q_TosYe0sT'
    );

    // Get token from URL query params
    const urlParams = new URLSearchParams(window.location.search);
    const tokenHash = urlParams.get('token_hash');
    const type = urlParams.get('type');

    if (tokenHash && type === 'recovery') {
      supabase.auth.verifyOtp({
        token_hash: tokenHash,
        type: 'recovery'
      }).then(({ data, error }) => {
        if (error) {
          document.getElementById('error').textContent = '⚠️ ' + error.message;
          document.getElementById('error').style.display = 'block';
        }
      });
    }

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const errorEl = document.getElementById('error');

      errorEl.style.display = 'none';

      if (!password || !confirm) {
        errorEl.textContent = '⚠️ Please fill in both fields';
        errorEl.style.display = 'block';
        return;
      }

      if (password !== confirm) {
        errorEl.textContent = '⚠️ Passwords do not match';
        errorEl.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorEl.textContent = '⚠️ Password must be at least 6 characters';
        errorEl.style.display = 'block';
        return;
      }

      // Check if session exists
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        errorEl.textContent = '⚠️ Session expired. Please request a new reset link.';
        errorEl.style.display = 'block';
        return;
      }

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        errorEl.textContent = '⚠️ ' + error.message;
        errorEl.style.display = 'block';
      } else {
        document.getElementById('form-section').style.display = 'none';
        document.getElementById('success-section').style.display = 'block';
      }
    }
  </script>
</body>
</html>
